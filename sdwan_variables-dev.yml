shared:
  org: ipf-netlab
  username: admin
  default_password: admin
  updated_password: admin@123
  port: "443"

timing:
  # Startup sequencing — delays between launching each component
  wait_before_automating_validator: 60
  wait_before_automating_controller: 120

  # Edge automation
  wait_before_activating_edge: 60
  wait_after_generating_payg_license: 30
  edge_cert_poll_interval_seconds: 10
  edge_cert_poll_timeout_seconds: 240

  # CSR operations
  wait_csr_generation: 30              # fixed wait on validator/controller after CSR is requested
  csr_generation_max_attempts: 3       # manager: max retries for the CSR generation API call
  csr_generation_retry_wait_seconds: 5 # manager: wait between CSR generation retries
  csr_file_timeout_seconds: 60         # manager: total budget for CSR file to appear
  csr_file_poll_interval_seconds: 5    # manager: how often to check for the CSR file

  # Netmiko — initial device connection (bootstrap)
  netmiko_connect_retry_wait_seconds: 120
  netmiko_connect_retry_max_seconds: 900
  netmiko_connect_lockout_retry_interval: 180

  # Netmiko — config push
  netmiko_increased_read_timeout: 60
  netmiko_config_retry_attempts: 2
  netmiko_config_retry_wait_seconds: 20

  # Netmiko — commit
  netmiko_commit_read_timeout: 120
  netmiko_commit_retry_attempts: 2
  netmiko_commit_retry_wait_seconds: 30

certificates:
  rsa_key: SDWAN.key
  root_cert: SDWAN.pem
  signed_cert: NewCertificate.crt

devices:
  manager:
    mgmt_ip: 10.194.59.20 # sdwan-manager mgmt_ip | mgmt.ipv4
    system_ip: 10.194.59.20 # sdwan-manager mgmt_ip | mgmt.ipv4
    site_id: 255
    route_gw: 10.10.0.1 # neighbor on internet router | interfaces.0.gateway.ipv4.split('/')[0]
    interface_name: eth1 # p2p2 to internet intf | interfaces.0.ifname
    interface_ip: 10.10.0.2 # p2p to internet ipv4 | interfaces.0.ipv4.split('/')[0]
    interface_prefix: 30 # p2p to internet prefix | interfaces.0.ipv4.split('/')[1]
    interface_desc: sdwan-manager to inet0 # p2p to internet description | interfaces.0.name.replace('->', 'to')
    country: FI # not sure it really matters, used for certificate generation
    state: Finland # not sure it really matters, used for certificate generation
    city: Helsinki # not sure it really matters, used for certificate generation
    csr_file: vmanage_csr # filename for the CSR generated by the manager, used in the workflow to detect when the CSR is ready and to read the CSR content
    api_ready_timeout_minutes: 15 # how long to wait for the manager's API to become responsive, after the manager container is launched

  controller:
    mgmt_ip: 10.194.59.21 # sdwan-validator mgmt_ip | mgmt.ipv4
    system_ip: 10.194.59.21 # sdwan-validator mgmt_ip | mgmt.ipv4
    site_id: 255
    route_gw: 10.10.0.9 # neighbor on internet router | interfaces.0.gateway.ipv4.split('/')[0]
    interface_name: eth1 # p2p2 to internet intf | interfaces.0.ifname
    interface_ip: 10.10.0.10 # p2p to internet ipv4 | interfaces.0.ipv4.split('/')[0]
    interface_prefix: 30 # p2p to internet prefix | interfaces.0.ipv4.split('/')[1]
    interface_desc: sdwan-controller to inet0 # p2p to internet description | interfaces.0.name.replace('->', 'to')
    csr_file: vsmart_csr # filename for the CSR generated by the controller, used in the workflow to detect when the CSR is ready and to read the CSR content

  validator:
    mgmt_ip: 10.194.59.22 # sdwan-controller mgmt_ip | mgmt.ipv4
    system_ip: 10.194.59.22 # sdwan-controller mgmt_ip | mgmt.ipv4
    site_id: 255
    route_gw: 10.10.0.5 # neighbor on internet router | interfaces.0.gateway.ipv4.split('/')[0]
    interface_name: eth1 # p2p2 to internet intf | interfaces.0.ifname
    interface_ip: 10.10.0.6 # p2p to internet ipv4 | interfaces.0.ipv4.split('/')[0]
    interface_prefix: 30 # p2p to internet prefix | interfaces.0.ipv4.split('/')[1]
    interface_desc: sdwan-validator to inet0 # p2p to internet description | interfaces.0.name.replace('->', 'to')
    csr_file: vbond_csr # filename for the CSR generated by the validator, used in the workflow to detect when the CSR is ready and to read the CSR content

  edges:
    edge1x01:
      mgmt_ip: 10.194.59.23 # mgmt.ipv4
      system_ip: 10.194.59.23 # mgmt.ipv4
      site_id: 591
      vrf_id: 200
      ospf_instance: 200
      ospf_area: 0.0.0.0
      bgp_local_as: 65591 # bgp.as
      bgp_mpls_as: 65100 # bgp.neighbors.0.as (where name contains 'mpls')
      bgp_inet_as: 65099 # bgp.neighbors.1.as (where name contains 'inet')
      inet_ip: 10.10.0.13 # interfaces.X.ipv4.split('/')[0] (where name contains 'inet')
      inet_mask: 255.255.255.252 # interfaces.X.ipv4.split('/')[1].map(prefix_to_mask) (where name contains 'inet')
      inet_gw: 10.10.0.14 # interfaces.X.neighbors.0.ipv4.split('/')[0] (where name contains 'inet' and neighbors.0 is the one with the gateway IP)
      inet_desc: edge1x01 to inet0 # interfaces.X.name.replace('->', 'to') (where name contains 'inet')
      inet_interface: GigabitEthernet5 # interfaces.X.ifname (where name contains 'inet')
      mpls_ip: 10.1.0.5 # interfaces.X.ipv4.split('/')[0] (where name contains 'mpls')
      mpls_mask: 255.255.255.252 # interfaces.X.ipv4.split('/')[1].map(prefix_to_mask) (where name contains 'mpls')
      mpls_gw: 10.1.0.6 # interfaces.X.neighbors.0.ipv4.split('/')[0] (where name contains 'mpls' and neighbors.0 is the one with the gateway IP)
      mpls_desc: edge1x01 to mpls0 # interfaces.X.name.replace('->', 'to') (where name contains 'mpls')
      mpls_interface: GigabitEthernet4 # interfaces.X.ifname (where name contains 'mpls')
      loopback100_ip: 183.100.1.1
      loopback100_mask: 255.255.255.255
      loopback200_ip: 183.200.1.1
      loopback200_mask: 255.255.255.255

      lan_interface: GigabitEthernet2 # interfaces.0.ifname
      lan_ip: 10.254.0.13 # interfaces.0.ipv4.split('/')[0]
      lan_mask: 255.255.255.252 # interfaces.0.ipv4.split('/')[1].map(prefix_to_mask)
